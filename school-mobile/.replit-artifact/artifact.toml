kind = "mobile"
previewPath = "/school-mobile/"
title = "School Mobile (Parent & Student)"
version = "1.0.0"
id = "artifacts/school-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/school-mobile/" ]
localPort = 20242

[services.development]
run = "npm -w @workspace/school-mobile run dev"

[services.production]
build = [ "npm", "-w", "@workspace/school-mobile", "run", "build" ]
run = [ "npm", "-w", "@workspace/school-mobile", "run", "serve" ]

[services.env]
PORT = "20242"
BASE_PATH = "/school-mobile/"
