services:

  nginx:
    image: nginx:alpine
    container_name: school_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
      - frontend_dist:/var/www/html:ro
    depends_on:
      - api1
      - api2
    restart: unless-stopped
    networks:
      - school_net

  api1:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: school_api1
    env_file: .env.prod
    volumes:
      - storage_data:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - school_net

  api2:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: school_api2
    env_file: .env.prod
    volumes:
      - storage_data:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - school_net

  horizon:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: school_horizon
    command: php artisan horizon
    env_file: .env.prod
    volumes:
      - storage_data:/var/www/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - school_net

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: school_scheduler
    command: >
      sh -c "while true; do
        php artisan schedule:run --no-interaction;
        sleep 60;
      done"
    env_file: .env.prod
    volumes:
      - storage_data:/var/www/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - school_net

  postgres:
    image: postgres:16-alpine
    container_name: school_postgres
    environment:
      POSTGRES_DB: school_prod
      POSTGRES_USER: school
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school -d school_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - school_net

  redis:
    image: redis:7-alpine
    container_name: school_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - school_net

  minio:
    image: minio/minio
    container_name: school_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - school_net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  storage_data:
  frontend_dist:

networks:
  school_net:
    driver: bridge
