services:

  nginx:
    image: nginx:1.27-alpine
    container_name: school_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
      - frontend_dist:/var/www/html:ro
      # Read-only access to uploaded files so /storage/... URLs are servable.
      - storage_data:/var/www/storage:ro
    depends_on:
      - api1
      - api2
    restart: unless-stopped
    networks:
      - school_net

  api1:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: school_api1
    env_file: .env.prod
    volumes:
      - storage_data:/var/www/storage
      # Named volume (not a host bind) so the pre-generated config/route cache is
      # shared across replicas while inheriting the image's www-data ownership —
      # required now that php-fpm runs as the non-root www-data user.
      - cache_data:/var/www/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - school_net

  api2:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: school_api2
    env_file: .env.prod
    volumes:
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - school_net

  queue:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: school_queue
    # Horizon is not installed; run the plain Redis queue worker. --max-time
    # recycles the worker hourly so deploys pick up new code.
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90 --max-time=3600
    env_file: .env.prod
    volumes:
      - storage_data:/var/www/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - school_net

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: school_scheduler
    command: >
      sh -c "while true; do
        php artisan schedule:run --no-interaction;
        sleep 60;
      done"
    env_file: .env.prod
    volumes:
      - storage_data:/var/www/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - school_net

  postgres:
    image: postgres:16-alpine
    container_name: school_postgres
    environment:
      POSTGRES_DB: school_prod
      POSTGRES_USER: school
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required — run via deploy/prod-up.sh so it is read from .env.prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school -d school_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - school_net

  redis:
    image: redis:7.4-alpine
    container_name: school_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required — run via deploy/prod-up.sh}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - school_net

  minio:
    image: minio/minio
    container_name: school_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_KEY:?MINIO_KEY is required — run via deploy/prod-up.sh}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET:?MINIO_SECRET is required — run via deploy/prod-up.sh}
    volumes:
      - minio_data:/data
    ports:
      # Bind the admin console to localhost only — reach it via SSH tunnel, never publicly.
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - school_net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  storage_data:
  frontend_dist:
  cache_data:

networks:
  school_net:
    driver: bridge
