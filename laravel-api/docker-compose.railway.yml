# Local smoke-test for the Railway image ONLY. Railway itself builds from
# Dockerfile.railway alone (see railway.json) and never reads this file.
#
# Usage (from laravel-api/):
#   1. Generate a key once:  php artisan key:generate --show
#   2. APP_KEY="base64:..." docker compose -f docker-compose.railway.yml up --build
#   3. Verify:               curl http://localhost:8080/api/healthz
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.railway
    ports:
      - "8080:8080"
    environment:
      APP_NAME: "School Management"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:?Set APP_KEY (php artisan key:generate --show)}
      APP_URL: http://localhost:8080
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: school_railway_test
      DB_USERNAME: school
      DB_PASSWORD: localtest-not-a-secret
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: school_railway_test
      POSTGRES_USER: school
      POSTGRES_PASSWORD: localtest-not-a-secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school -d school_railway_test"]
      interval: 5s
      timeout: 5s
      retries: 10
