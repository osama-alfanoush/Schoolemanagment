upstream php_backend {
    least_conn;
    server api1:9000;
    server api2:9000;
    keepalive 16;
}

limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m   rate=120r/m;

server {
    listen 80;
    server_name _;

    root /var/www/public;
    index index.php;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS must be an HTTP header (cannot be set via <meta>); the SPA shell and
    # assets are served here, not through the Laravel SecurityHeaders middleware.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    server_tokens off;

    client_max_body_size 20M;

    location = /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        try_files $uri /index.php?$query_string;
        fastcgi_pass php_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 30;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        try_files $uri /index.php?$query_string;
        fastcgi_pass php_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
    }

    # User uploads (profile photos, school logos) live on the shared storage
    # volume, mounted read-only from the API containers. Served directly so
    # /storage/... URLs resolve in production instead of 404ing.
    location /storage/ {
        alias /var/www/storage/app/public/;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Never expose JS/CSS source maps to the public.
    location ~ \.map$ {
        deny all;
        return 404;
    }

    location ~ \.php$ {
        fastcgi_pass php_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
    }

    # Content-hashed build assets are immutable — safe to cache for a year.
    location /assets/ {
        root /var/www/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback. The shell (index.html) must NOT be cached long-term or
    # clients keep loading stale JS references after a deploy.
    location / {
        root /var/www/html;
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        root /var/www/html;
        add_header Cache-Control "no-cache";
    }

    location = /api/health {
        try_files $uri /index.php?$query_string;
        fastcgi_pass php_backend;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
}
