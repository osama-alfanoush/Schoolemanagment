name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "school-web/**"
      - ".github/workflows/deploy-frontend.yml"
  # Allow manual re-deploys from the Actions tab (e.g. after changing the
  # VITE_API_BASE_URL repository variable).
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

permissions:
  contents: write # push to the gh-pages branch

jobs:
  deploy:
    name: Build & publish to gh-pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: school-web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: school-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        env:
          # With a custom domain (PAGES_CNAME repository variable set, e.g.
          # your-domain.com) the site is served from the domain root, so the
          # base path is /. Without it, Pages serves the project path
          # https://osama-alfanoush.github.io/Schoolemanagment/.
          BASE_PATH: ${{ vars.PAGES_CNAME != '' && '/' || '/Schoolemanagment/' }}
          # Backend URL. The VITE_API_BASE_URL repository variable
          # (Settings → Secrets and variables → Actions → Variables) overrides
          # the default below — set it when switching to a custom domain
          # (https://api.your-domain.com/api).
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://schoolemanagment-production.up.railway.app/api' }}
        run: npm run build

      # GitHub Pages serves 404.html for unknown paths; shipping the SPA there
      # makes deep links like /Schoolemanagment/dashboard load the app.
      - name: Add SPA fallback
        run: cp dist/public/index.html dist/public/404.html

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: school-web/dist/public
          publish_branch: gh-pages
          # Writes the CNAME file GitHub Pages needs for a custom domain.
          # Empty (variable unset) = no CNAME file = default github.io URL.
          cname: ${{ vars.PAGES_CNAME }}
          # Always push a fresh single-commit branch, even when the built
          # files are unchanged — an identical build otherwise skips the push
          # and GitHub never starts a new Pages deployment.
          force_orphan: true
